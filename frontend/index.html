<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex City - Community Hero</title>

    <!-- Preload all Cherry Wood cursor files for instant response, no flash -->
    <link rel="preload" href="/cursors/Cherry Wood (normal select).cur"           as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (link select).ani"             as="image" />
    <link rel="preload" href="/cursors/Cherry Wood (text select).cur"             as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (busy).cur"                    as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (working in background).cur"   as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (unavailable).cur"             as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (move).cur"                    as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (help select).cur"             as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (horizontal resize).cur"       as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (vertical resize).cur"         as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (diagonal resize 1).cur"       as="image" type="image/x-win-bitmap" />
    <link rel="preload" href="/cursors/Cherry Wood (precision select).cur"        as="image" type="image/x-win-bitmap" />

    <!-- Inline cursor rule — fires immediately, before any JS/CSS bundle loads -->
    <!-- This kills the white-cursor flash at page load -->
    <style>
      html, body, * {
        cursor: url('/cursors/Cherry Wood (normal select).cur'), auto !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
